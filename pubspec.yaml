name: solar_calculator
description: "a solar caculator for calculate how much enargy you are use in a day."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  loading_animation_widget: ^1.3.0
  dio: ^5.10.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  get_it: ^8.3.0
  shared_preferences: ^2.5.5
  equatable: ^2.1.0
  go_router: ^15.1.2
  flutter_staggered_animations: ^1.1.1
  flutter_markdown: ^0.7.7+1
  syncfusion_flutter_charts: ^33.2.15
  share_plus: ^10.1.4
  flutter_localizations:
    sdk: flutter
  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FDFBFF"
  adaptive_icon_foreground: assets/images/logo_transparent.png
  web:
    generate: true
    image_path: assets/images/logo.png
    background_color: "#1A1C1E"
    theme_color: "#001B42"
  windows:
    generate: true
    image_path: assets/images/logo.png
    icon_size: 256

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data.json
    - assets/images/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
